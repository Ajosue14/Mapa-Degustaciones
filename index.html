<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <title>Mapa PRO</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- ✅ CSS reales -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="https://unpkg.com/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <style>
    :root{
      --panel-bg:#fff; --panel-br:#ddd; --text:#102a43;
      --shadow:0 10px 30px rgba(0,0,0,.15);
      --fab-bg:#fff; --fab-tx:#111;
    }
    html,body{margin:0;height:100%;}
    #map{width:100%;height:100%;}

    /* baja el zoom para no chocar con FAB */
    .leaflet-top.leaflet-left{top:80px;}

    /* paneles */
    .panel{
      position:absolute;z-index:999;background:var(--panel-bg);color:var(--text);
      border:1px solid var(--panel-br);border-radius:14px;
      padding:14px;font-family:"Segoe UI";box-shadow:var(--shadow);
      transition:.25s ease;opacity:1;
    }
    .collapsed{opacity:0;visibility:hidden;transform:translateY(-10px);}
    .filters{top:80px;left:12px;width:260px;}
    .search{ top:80px;right:12px;width:260px;}
    .legend{bottom:12px;left:12px;width:240px;}

    input,select{width:100%;padding:10px;margin-top:8px;border-radius:10px;border:1px solid #ccc;}
    button{width:100%;padding:10px;margin-top:8px;border:none;border-radius:10px;background:#0078d7;color:white;font-weight:700;}
    .btn-plain{background:#f2f2f2;color:#333;}

    /* FABs blancos */
    .fab{
      position:absolute;z-index:1000;width:48px;height:48px;border-radius:50%;
      background:var(--fab-bg);color:var(--fab-tx);display:grid;place-items:center;
      box-shadow:0 6px 18px rgba(0,0,0,.25);border:1px solid #ddd;cursor:pointer;
    }
    .fab-left{left:12px;top:12px;}
    .fab-right{right:12px;top:12px;}

    .btn-close{
      position:absolute;right:10px;top:10px;width:28px;height:28px;background:#eee;
      border:none;border-radius:50%;display:grid;place-items:center;cursor:pointer;
    }

    .dot{width:14px;height:14px;border-radius:50%;display:inline-block;margin-right:5px;}
  </style>
</head>
<!-- ✅ Scripts reales -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<script>
/* ================= MAPA ================= */
const map = L.map("map").setView([-12.05,-77.05], 11);
L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(map);

const layerPins = L.layerGroup().addTo(map);

/* ================= COLORES ================= */
const COLORS = {
  "SUPERMERCADOS PERUANOS":"#E74C3C",
  "CENCOSUD":"#3498DB",
  "TOTTUS":"#27AE60",
  "METRO":"#F1C40F",
  "VIVANDA":"#E67E22",
  "NO ESPECIFICADO":"#7F8C8D"
};

function pin(color){
  const svg = `
  <svg xmlns='http://www.w3.org/2000/svg' width='26' height='38'>
    <path d='M13 0C5.8 0 0 5.8 0 13c0 10 13 25 13 25s13-15 13-25C26 5.8 20.2 0 13 0z' fill='${color}'/>
    <circle cx='13' cy='13' r='6' fill='white'/>
  </svg>`;
  return L.icon({
    iconUrl:"data:image/svg+xml;utf8,"+encodeURIComponent(svg),
    iconSize:[26,38],iconAnchor:[13,38],popupAnchor:[0,-30]
  });
}

function NK(r){
  const o={}; for(const k in r){ o[k.trim().toUpperCase()] = r[k]; }
  return o;
}

function clienteStd(row){
  const c=(row["CLIENTE"]||"").toUpperCase();
  const n=(row["NOMBRE"]||"").toUpperCase();

  if(c.includes("SUPERMERCADOS")) return "SUPERMERCADOS PERUANOS";
  if(c.includes("CENCOSUD"))      return "CENCOSUD";
  if(c.includes("TOTTUS"))        return "TOTTUS";
  if(n.includes("METRO"))         return "METRO";
  if(n.includes("VIVANDA"))       return "VIVANDA";
  if(n.includes("WONG"))          return "CENCOSUD";
  if(n.includes("PLAZA")||n.includes("VEA")) return "SUPERMERCADOS PERUANOS";

  return "NO ESPECIFICADO";
}

/* ========== Cargar CSV ========= */
let PUNTOS=[];

Papa.parse("tiendas.csv?v="+Date.now(),{
  download:true, header:true, dynamicTyping:true,
  complete:(res)=>{
    res.data.forEach(r0=>{
      const r=NK(r0);

      if(!r["LATITUD"] || !r["LONGITUD"]) return;

      const nombre=r["NOMBRE"];
      const dist=r["DISTRITO"];
      const cli=clienteStd(r);
      const color=COLORS[cli];
      const lat=parseFloat(r["LATITUD"]);
      const lng=parseFloat(r["LONGITUD"]);
      const sumin=r["C.SUMIN"]||r["SUMIN"]||"";

      const mk=L.marker([lat,lng],{icon:pin(color)});
      mk.bindPopup(`<b>${nombre}</b><br>${cli}<br>${dist}<br>${sumin}`);

      PUNTOS.push({mk,nombre,dist,cli,sumin});
      layerPins.addLayer(mk);
    });

    document.getElementById("count").innerText=PUNTOS.length+" tiendas";
    const sel=document.getElementById("fDist");
    const d=[...new Set(PUNTOS.map(p=>p.dist))].sort();
    sel.innerHTML=`<option value="all">Todos</option>`+d.map(x=>`<option>${x}</option>`).join("");
  }
});

/* ========== Filtro distrito ========== */
function filtrar(){
  const dist=document.getElementById("fDist").value;
  layerPins.clearLayers();
  const visibles=(dist==="all")?PUNTOS:PUNTOS.filter(p=>p.dist===dist);
  visibles.forEach(p=>layerPins.addLayer(p.mk));
}
document.getElementById("fDist").onchange=filtrar;

/* ========== Buscar ========== */
document.getElementById("btnBuscar").onclick=()=>{
  const q=document.getElementById("q").value.toLowerCase();
  const hit=PUNTOS.find(p=>
    p.nombre.toLowerCase().includes(q) || String(p.sumin).includes(q)
  );
  if(hit){
    map.setView(hit.mk.getLatLng(),16);
    hit.mk.openPopup();
  } else alert("No encontrado");
};
document.getElementById("btnLimpiar").onclick=()=>{document.getElementById("q").value="";};

/* ========== Paneles slide ========== */
const PF=document.getElementById("panelFilters");
const PS=document.getElementById("panelSearch");

openFilters.onclick=()=>PF.classList.remove("collapsed");
openSearch.onclick =()=>PS.classList.remove("collapsed");

closeFilters.onclick=()=>PF.classList.add("collapsed");
closeSearch.onclick =()=>PS.classList.add("collapsed");

document.addEventListener("click",(e)=>{
  if(!PF.contains(e.target)&&!openFilters.contains(e.target)) PF.classList.add("collapsed");
  if(!PS.contains(e.target)&&!openSearch.contains(e.target))  PS.classList.add("collapsed");
});
</script>
``
<body>

<div id="map"></div>

<!-- FABs -->
<button id="openFilters" class="fab fab-left"><i class="bi bi-sliders"></i></button>
<button id="openSearch"  class="fab fab-right"><i class="bi bi-search"></i></button>

<!-- PANEL FILTROS -->
<div id="panelFilters" class="panel filters collapsed">
  <button class="btn-close" id="closeFilters"><i class="bi bi-x"></i></button>
  <h3>Filtros</h3>
  <label>Distrito</label>
  <select id="fDist"><option value="all">Todos</option></select>
  <p id="count"></p>
</div>

<!-- PANEL BUSCAR -->
<div id="panelSearch" class="panel search collapsed">
  <button class="btn-close" id="closeSearch"><i class="bi bi-x"></i></button>
  <h3>Buscar</h3>
  <input id="q" placeholder="Nombre o suministro">
  <button id="btnBuscar">Buscar</button>
  <button id="btnLimpiar" style="background:#eee;color:#333;">Limpiar</button>
</div>

<!-- LEYENDA -->
<div class="panel legend">
  <h3>Leyenda</h3>
  <p><span class="dot" style="background:#E74C3C"></span>Supermercados Peruanos</p>
  <p><span class="dot" style="background:#3498DB"></span>Cencosud</p>
  <p><span class="dot" style="background:#27AE60"></span>Tottus</p>
  <p><span class="dot" style="background:#F1C40F"></span>Metro</p>
  <p><span class="dot" style="background:#E67E22"></span>Vivanda</p>
  <p><span class="dot" style="background:#7F8C8D"></span>Otros</p>
</div>

<!-- ✅ JS REAL -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<script>
/* ================= MAPA ================= */
const map = L.map("map").setView([-12.05,-77.05], 11);
L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(map);
const layerPins = L.layerGroup().addTo(map);

/* ================= COLORES ================= */
const COLORS = {
  "SUPERMERCADOS PERUANOS":"#E74C3C",
  "CENCOSUD":"#3498DB",
  "TOTTUS":"#27AE60",
  "METRO":"#F1C40F",
  "VIVANDA":"#E67E22",
  "NO ESPECIFICADO":"#7F8C8D"
};

/* ICONO PIN */
function pin(color){
  const svg = `
  <svg xmlns='http://www.w3.org/2000/svg' width='26' height='38'>
    <path d='M13 0C5.8 0 0 5.8 0 13c0 10 13 25 13 25s13-15 13-25C26 5.8 20.2 0 13 0z' fill='${color}'/>
    <circle cx='13' cy='13' r='6' fill='white'/>
  </svg>`;
  return L.icon({
    iconUrl:"data:image/svg+xml;utf8,"+encodeURIComponent(svg),
    iconSize:[26,38],iconAnchor:[13,38],popupAnchor:[0,-30]
  });
}

/* NORMALIZAR CSV */
function NK(r){
  const o={}; for(const k in r){
    o[String(k).trim().toUpperCase()] = r[k];
  } return o;
}

/* DETECTAR CLIENTE */
function clienteStd(row){
  const c=(row["CLIENTE"]||"").toUpperCase();
  const n=(row["NOMBRE"]||"").toUpperCase();

  if(c.includes("SUPERMERCADOS")) return "SUPERMERCADOS PERUANOS";
  if(c.includes("CENCOSUD"))      return "CENCOSUD";
  if(c.includes("TOTTUS"))        return "TOTTUS";
  if(n.includes("METRO"))         return "METRO";
  if(n.includes("VIVANDA"))       return "VIVANDA";
  if(n.includes("WONG"))          return "CENCOSUD";
  if(n.includes("PLAZA")||n.includes("VEA"))
                                return "SUPERMERCADOS PERUANOS";

  return "NO ESPECIFICADO";
}

/* =========== CARGAR CSV Y PINTAR TIENDAS =========== */
let PUNTOS=[];

Papa.parse("tiendas.csv?v="+Date.now(),{
  download:true, header:true, dynamicTyping:true,
  complete:(res)=>{

    res.data.forEach(r0=>{
      const r=NK(r0);
      if(!r["LATITUD"] || !r["LONGITUD"]) return;

      const cli=clienteStd(r);
      const color=COLORS[cli];
      const lat=parseFloat(r["LATITUD"]);
      const lng=parseFloat(r["LONGITUD"]);
      const nombre=r["NOMBRE"];
      const dist=r["DISTRITO"];
      const sumin=r["C.SUMIN"]||r["SUMIN"]||"";

      const mk=L.marker([lat,lng],{icon:pin(color)});
      mk.bindPopup(`<b>${nombre}</b><br>${cli}<br>${dist}<br>${sumin}`);

      PUNTOS.push({mk,nombre,dist,cli,sumin});
      layerPins.addLayer(mk);
    });

    document.getElementById("count").innerText=PUNTOS.length+" tiendas";

    const sel=document.getElementById("fDist");
    const d=[...new Set(PUNTOS.map(p=>p.dist))].sort();
    sel.innerHTML=`<option value="all">Todos</option>`+d.map(x=>`<option>${x}</option>`).join("");

    if(PUNTOS.length){
      const g=L.featureGroup(PUNTOS.map(p=>p.mk));
      map.fitBounds(g.getBounds().pad(0.2));
    }

    sel.onchange = ()=>filtrar();
  }
});

function filtrar(){
  const dist=document.getElementById("fDist").value;
  layerPins.clearLayers();

  const visibles = (dist==="all")
    ? PUNTOS
    : PUNTOS.filter(p=>p.dist===dist);

  visibles.forEach(p=>layerPins.addLayer(p.mk));

  if(visibles.length){
    const g=L.featureGroup(visibles.map(p=>p.mk));
    map.fitBounds(g.getBounds().pad(0.2));
  }
}

/* ================= BUSCAR ================= */
document.getElementById("btnBuscar").onclick=()=>{
  const q=document.getElementById("q").value.toLowerCase();
  const hit=PUNTOS.find(p=>
    p.nombre.toLowerCase().includes(q) ||
    String(p.sumin).includes(q)
  );
  if(hit){ map.setView(hit.mk.getLatLng(),17); hit.mk.openPopup(); }
  else alert("No encontrado");
};
document.getElementById("btnLimpiar").onclick=()=>{ document.getElementById("q").value=""; };

/* PANEL SLIDE */
const PF=document.getElementById("panelFilters");
const PS=document.getElementById("panelSearch");
openFilters.onclick=()=>PF.classList.remove("collapsed");
openSearch.onclick =()=>PS.classList.remove("collapsed");
closeFilters.onclick=()=>PF.classList.add("collapsed");
closeSearch.onclick =()=>PS.classList.add("collapsed");

document.addEventListener("click",(e)=>{
  if(!PF.contains(e.target) && !openFilters.contains(e.target)) PF.classList.add("collapsed");
  if(!PS.contains(e.target) && !openSearch.contains(e.target))  PS.classList.add("collapsed");
});
</script>

</body>
</html>
