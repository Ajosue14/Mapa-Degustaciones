<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <title>Mapa PRO</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css">
  <link rel="stylesheet" href="https://unpkg.com/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

  <style>
    :root{
      --panel-bg:#fff; --panel-br:rgba(0,0,0,.06);
      --shadow:0 10px 30px rgba(0,0,0,.15);
      --text:#102a43;
    }
    html, body { margin:0; height:100%; }
    #map { width:100%; height:100%; }
    .panel{
      position:absolute; z-index:999; background:var(--panel-bg); color:var(--text);
      border:1px solid var(--panel-br); padding:14px; border-radius:14px;
      font-family:"Segoe UI",system-ui,-apple-system,Arial; box-shadow:var(--shadow);
    }
    .search{ top:12px; right:12px; width:300px; }
    .filters{ top:12px; left:12px; width:260px; }
    .legend{ bottom:12px; left:12px; width:260px; }
    h3{ margin:0 0 10px; display:flex; align-items:center; gap:8px; font-size:16px; }
    input, select{ width:100%; padding:10px; border-radius:10px; border:1px solid #ccc; }
    button{
      width:100%; padding:11px; margin-top:8px; border:none; border-radius:10px; cursor:pointer;
      background:linear-gradient(135deg,#0078D7,#2196F3); color:#fff; font-weight:700;
    }
    .dot{ width:12px; height:12px; border-radius:50%; display:inline-block; margin-right:6px; }
    /* Icono de cluster personalizado */
    .mycluster { background: transparent; border: none; }
  </style>
</head>

<body>
  <div id="map"></div>

  <!-- BUSCAR -->
  <div class="panel search">
    <h3><i class="bi bi-search"></i> Buscar</h3>
    <input id="q" placeholder="Nombre o suministro">
    <button id="btnBuscar">Buscar</button>
    <button id="btnLimpiar" style="background:#f2f2f2;color:#333;">Limpiar</button>
  </div>

  <!-- FILTROS -->
  <div class="panel filters">
    <h3><i class="bi bi-sliders"></i> Filtros</h3>

    <label>Distrito</label>
    <select id="fDist"><option value="all">Todos</option></select>

    <!-- Checkboxes solo informativos (deshabilitados) -->
    <div style="margin-top:10px; opacity:.7; font-size:14px;">
      <label><input type="checkbox" checked disabled> <span class="dot" style="background:#E74C3C"></span>Supermercados Peruanos</label><br>
      <label><input type="checkbox" checked disabled> <span class="dot" style="background:#3498DB"></span>Cencosud</label><br>
      <label><input type="checkbox" checked disabled> <span class="dot" style="background:#27AE60"></span>Tottus</label><br>
      <label><input type="checkbox" checked disabled> <span class="dot" style="background:#F1C40F"></span>Metro</label><br>
      <label><input type="checkbox" checked disabled> <span class="dot" style="background:#E67E22"></span>Vivanda</label><br>
      <label><input type="checkbox" checked disabled> <span class="dot" style="background:#7F8C8D"></span>Otros</label>
    </div>

    <p id="count" style="margin-top:10px;"></p>
  </div>

  <!-- LEYENDA -->
  <div class="panel legend">
    <h3><i class="bi bi-info-circle"></i> Leyenda</h3>
    <p><span class="dot" style="background:#E74C3C"></span>Supermercados Peruanos</p>
    <p><span class="dot" style="background:#3498DB"></span>Cencosud</p>
    <p><span class="dot" style="background:#27AE60"></span>Tottus</p>
    <p><span class="dot" style="background:#F1C40F"></span>Metro</p>
    <p><span class="dot" style="background:#E67E22"></span>Vivanda</p>
    <p><span class="dot" style="background:#7F8C8D"></span>Otros</p>
  </div>

  <!-- JS al final -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

  <script>
  // ====== Mapa base
  const map = L.map("map").setView([-12.05,-77.05], 11);
  L.tileLayer("https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png", {
    attribution:"© OpenStreetMap • © CARTO"
  }).addTo(map);

  // ====== Colores por cadena
  const COLORS = {
    "SUPERMERCADOS PERUANOS":"#E74C3C",
    "CENCOSUD":"#3498DB",
    "TOTTUS":"#27AE60",
    "METRO":"#F1C40F",
    "VIVANDA":"#E67E22",
    "NO ESPECIFICADO":"#7F8C8D"
  };

  // ====== Icono pin SVG a color
  function pinIcon(color){
    const svg = `
      <svg xmlns='http://www.w3.org/2000/svg' width='26' height='38'>
        <path d='M13 0C5.8 0 0 5.8 0 13c0 10 13 25 13 25s13-15 13-25C26 5.8 20.2 0 13 0z' fill='${color}'/>
        <circle cx='13' cy='13' r='6' fill='white'/>
      </svg>`;
    return L.icon({
      iconUrl: "data:image/svg+xml;utf8," + encodeURIComponent(svg),
      iconSize:[26,38], iconAnchor:[13,38], popupAnchor:[0,-30]
    });
  }

  // ====== Detectar cliente por nombre
  function detectarCliente(nombre){
    const n = (nombre || "").toUpperCase();
    if(n.includes("TOTTUS")) return "TOTTUS";
    if(n.includes("METRO")) return "METRO";
    if(n.includes("VIVANDA")) return "VIVANDA";
    if(n.includes("WONG")) return "CENCOSUD";
    if(n.includes("PLAZA VEA") || n.includes("SUPER VEA") || n.includes("SUPERMERCADOS PERUANOS"))
      return "SUPERMERCADOS PERUANOS";
    return "NO ESPECIFICADO";
  }

  // ====== Normalizar cabeceras CSV
  function normKeys(row){
    const out = {};
    for(const k in row){
      if(!Object.prototype.hasOwnProperty.call(row,k)) continue;
      const nk = String(k||"").replace(/\uFEFF/g,"").replace(/\u00A0/g," ").trim().toUpperCase();
      out[nk] = row[k];
    }
    return out;
  }
  function pad4(v){ if(v==null) return ""; const s=String(v).trim(); return /^\d+$/.test(s)? s.padStart(4,"0"): s; }

  // ====== Cluster coloreado por color dominante
  const cluster = L.markerClusterGroup({
    iconCreateFunction: function (cl) {
      const children = cl.getAllChildMarkers();
      const tally = {};
      children.forEach(m => {
        const chain = m.options.chain || "NO ESPECIFICADO";
        tally[chain] = (tally[chain] || 0) + 1;
      });
      // color del grupo = cadena más frecuente
      let top = "NO ESPECIFICADO", max = 0;
      Object.keys(tally).forEach(k => { if(tally[k] > max){ max = tally[k]; top = k; }});
      const color = COLORS[top] || "#7F8C8D";
      const html = `<div style="
          background:${color};
          color:#fff; font-weight:700;
          border-radius:50%; width:38px; height:38px;
          display:flex; align-items:center; justify-content:center;
          border:2px solid #fff; box-shadow:0 0 0 2px rgba(0,0,0,.15);
        ">${cl.getChildCount()}</div>`;
      return L.divIcon({ html, className:"mycluster", iconSize:[38,38] });
    }
  });
  map.addLayer(cluster);

  // ====== Datos en memoria
  let PUNTOS = [];   // { mk, cli, dist, nombre, sumin }

  // ====== Cargar CSV
  Papa.parse("tiendas.csv?v="+Date.now(), {
    download:true, header:true, dynamicTyping:true, skipEmptyLines:"greedy",
    complete: function(res){
      const raw = res.data || [];

      // Normalizar + crear marcadores
      raw.forEach(r0 => {
        const r = normKeys(r0);
        const nombre = (r["NOMBRE"]||"").toString().trim();
        const cli    = detectarCliente(nombre);
        const dist   = (r["DISTRITO"]||"").toString().trim();
        const lat    = parseFloat(r["LATITUD"]);
        const lng    = parseFloat(r["LONGITUD"]);
        const sumin  = pad4(r["C.SUMIN"] || r["SUMIN"] || r["SUM"]);

        if (!Number.isFinite(lat) || !Number.isFinite(lng)) return;

        const mk = L.marker([lat,lng], { icon: pinIcon(COLORS[cli]||COLORS["NO ESPECIFICADO"]), chain: cli });
        mk.bindPopup(
          `<b>${nombre}</b><br>
           <b>Cliente:</b> ${cli}<br>
           <b>Distrito:</b> ${dist}<br>
           <b>Suministro:</b> ${sumin || "-"}`);
        PUNTOS.push({ mk, cli, dist, nombre, sumin });
      });

      // Poner todos los pines SIEMPRE
      PUNTOS.forEach(p => cluster.addLayer(p.mk));
      document.getElementById("count").innerText = `${PUNTOS.length} tiendas`;

      // Llenar distritos
      const sel = document.getElementById("fDist");
      const dists = [...new Set(PUNTOS.map(p=>p.dist))].filter(Boolean).sort();
      sel.innerHTML = `<option value="all">Todos</option>` + dists.map(d=>`<option>${d}</option>`).join("");

      // Eventos
      sel.addEventListener("change", aplicarDistrito);
      document.getElementById("btnBuscar").addEventListener("click", buscar);
      document.getElementById("btnLimpiar").addEventListener("click", ()=>{ document.getElementById("q").value=""; });
      document.getElementById("q").addEventListener("keydown", e=>{ if(e.key==="Enter") buscar(); });

      // Ajuste inicial
      if(PUNTOS.length){
        const g = L.featureGroup(PUNTOS.map(p=>p.mk));
        map.fitBounds(g.getBounds().pad(0.2));
      }
    }
  });

  // ====== Mostrar SIEMPRE todos; solo filtra por distrito si se elige
  function aplicarDistrito(){
    const dist = document.getElementById("fDist").value;
    cluster.clearLayers();

    const visibles = (dist==="all")
      ? PUNTOS.map(p=>p.mk)
      : PUNTOS.filter(p=>p.dist===dist).map(p=>p.mk);

    visibles.forEach(m => cluster.addLayer(m));
    document.getElementById("count").innerText =
      `${visibles.length} tienda${visibles.length===1?"":"s"} visible${visibles.length===1?"":"s"}`;

    if(visibles.length){
      const g = L.featureGroup(visibles);
      map.fitBounds(g.getBounds().pad(0.2));
    }
  }

  // ====== Buscar (por nombre o suministro)
  function buscar(){
    const q = document.getElementById("q").value.toLowerCase().trim();
    if(!q) return;
    const hit = PUNTOS.find(p =>
      (p.nombre && p.nombre.toLowerCase().includes(q)) ||
      (p.sumin  && p.sumin.includes(q))
    );
    if(hit){
      map.setView(hit.mk.getLatLng(), 16);
      hit.mk.openPopup();
    }else{
      alert("No encontrado");
    }
  }
  </script>
</body>
</html>
``
